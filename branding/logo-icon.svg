<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <!-- Icon-only logo: for favicon, app icon, avatar placeholder -->
  <!-- Matches nav usage: 34×34px, border-radius 9px            -->
  <clipPath id="rounded">
    <rect width="64" height="64" rx="14"/>
  </clipPath>
  <image href="logo.png" x="0" y="0" width="64" height="64" clip-path="url(#rounded)"/>
</svg>

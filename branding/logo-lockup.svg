<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 60" font-family="'Fraunces', Georgia, serif">
  <!-- Full lockup: logo.png icon + wordmark. Primary logo for nav, headers, emails -->
  <!-- Matches nav: img 34×34 border-radius 9px + "pair{go}" text                   -->
  <clipPath id="logo-clip">
    <rect x="0" y="5" width="50" height="50" rx="11"/>
  </clipPath>
  <image href="logo.png" x="0" y="5" width="50" height="50" clip-path="url(#logo-clip)"/>
  <!-- Wordmark -->
  <text x="62" y="46"
    font-size="38"
    font-weight="800"
    letter-spacing="-1.5"
    fill="#1A1A18">pair<tspan fill="#E8654A">go</tspan></text>
</svg>

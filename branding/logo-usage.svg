<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 620" font-family="'DM Sans', system-ui, sans-serif">

  <defs>
    <clipPath id="c1"><rect x="120" y="110" width="40" height="40" rx="9"/></clipPath>
    <clipPath id="c2"><rect x="400" y="110" width="40" height="40" rx="9"/></clipPath>
    <clipPath id="c3"><rect x="120" y="275" width="40" height="40" rx="9"/></clipPath>
    <clipPath id="c4"><rect x="400" y="275" width="40" height="40" rx="9"/></clipPath>
    <clipPath id="c5"><rect x="690" y="268" width="58" height="58" rx="13"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#FAFAF7"/>

  <!-- Title -->
  <text x="40" y="50" font-size="13" font-weight="600" letter-spacing="2" fill="#8A8A82">PAIRGO — LOGO USAGE GUIDE</text>
  <line x1="40" y1="62" x2="860" y2="62" stroke="#E8E8E2" stroke-width="1"/>

  <!-- ── Variant 1: Lockup on dark ────────────── -->
  <rect x="40" y="80" width="260" height="140" rx="16" fill="#1A1A18"/>
  <image href="logo.png" x="82" y="105" width="36" height="36" clip-path="url(#c1)"/>
  <text x="130" y="128" font-size="22" font-weight="800" fill="white" font-family="'Fraunces',Georgia,serif" letter-spacing="-1">pair<tspan fill="#E8654A">go</tspan></text>
  <text x="160" y="195" font-size="10" fill="#8A8A82" text-anchor="middle" letter-spacing="1.5">LOCKUP · DARK BG</text>

  <!-- ── Variant 2: Lockup on light ───────────── -->
  <rect x="320" y="80" width="260" height="140" rx="16" fill="#FAFAF7" stroke="#E8E8E2" stroke-width="1"/>
  <image href="logo.png" x="362" y="105" width="36" height="36" clip-path="url(#c2)"/>
  <text x="410" y="128" font-size="22" font-weight="800" fill="#1A1A18" font-family="'Fraunces',Georgia,serif" letter-spacing="-1">pair<tspan fill="#E8654A">go</tspan></text>
  <text x="450" y="195" font-size="10" fill="#8A8A82" text-anchor="middle" letter-spacing="1.5">LOCKUP · LIGHT BG</text>

  <!-- ── Variant 3: Wordmark only dark ─────────── -->
  <rect x="600" y="80" width="260" height="140" rx="16" fill="#1A1A18"/>
  <text x="730" y="158" font-size="36" font-weight="800" fill="white" text-anchor="middle" font-family="'Fraunces',Georgia,serif" letter-spacing="-1.5">pair<tspan fill="#E8654A">go</tspan></text>
  <text x="730" y="195" font-size="10" fill="#8A8A82" text-anchor="middle" letter-spacing="1.5">WORDMARK ONLY · DARK</text>

  <!-- ── Variant 4: Lockup on dark (larger icon) -->
  <rect x="40" y="245" width="260" height="140" rx="16" fill="#1A1A18"/>
  <image href="logo.png" x="80" y="268" width="42" height="42" clip-path="url(#c3)"/>
  <text x="135" y="295" font-size="26" font-weight="800" fill="white" font-family="'Fraunces',Georgia,serif" letter-spacing="-1">pair<tspan fill="#E8654A">go</tspan></text>
  <text x="45" y="368" font-size="10" fill="#8A8A82" letter-spacing="1.5">LOCKUP · LARGE DARK</text>

  <!-- ── Variant 5: Lockup on light (larger) ──── -->
  <rect x="320" y="245" width="260" height="140" rx="16" fill="#FAFAF7" stroke="#E8E8E2" stroke-width="1"/>
  <image href="logo.png" x="360" y="268" width="42" height="42" clip-path="url(#c4)"/>
  <text x="415" y="295" font-size="26" font-weight="800" fill="#1A1A18" font-family="'Fraunces',Georgia,serif" letter-spacing="-1">pair<tspan fill="#E8654A">go</tspan></text>
  <text x="325" y="368" font-size="10" fill="#8A8A82" letter-spacing="1.5">LOCKUP · LARGE LIGHT</text>

  <!-- ── Variant 6: Icon only ───────────────────── -->
  <rect x="600" y="245" width="260" height="140" rx="16" fill="#F0EFE9"/>
  <image href="logo.png" x="690" y="268" width="80" height="80" clip-path="url(#c5)"/>
  <text x="730" y="368" font-size="10" fill="#8A8A82" text-anchor="middle" letter-spacing="1.5">ICON ONLY · FAVICON / APP</text>

  <!-- ── Rules ─────────────────────────────────── -->
  <line x1="40" y1="415" x2="860" y2="415" stroke="#E8E8E2" stroke-width="1"/>

  <text x="40" y="444" font-size="12" font-weight="600" fill="#4A4A45">Clearspace</text>
  <text x="40" y="462" font-size="11" fill="#8A8A82">Always maintain minimum clearspace of 1× the cap-height of the wordmark on all sides.</text>

  <text x="40" y="494" font-size="12" font-weight="600" fill="#4A4A45">Minimum Sizes</text>
  <text x="40" y="512" font-size="11" fill="#8A8A82">Icon only: 16×16 px (favicon)  ·  Full lockup: 80px wide  ·  Wordmark alone: 60px wide</text>

  <text x="40" y="544" font-size="12" font-weight="600" fill="#4A4A45">Don'ts</text>
  <text x="40" y="562" font-size="11" fill="#8A8A82">Don't recolor "go" to anything other than coral (#E8654A).  ·  Don't stretch or rotate the logo.</text>
  <text x="40" y="578" font-size="11" fill="#8A8A82">Don't place dark wordmark on dark backgrounds.  ·  Don't add drop shadows to the SVG files.</text>
  <text x="40" y="594" font-size="11" fill="#8A8A82">Don't place the logo on busy photos without a dark overlay.</text>

</svg>
